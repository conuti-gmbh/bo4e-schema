components:
  schemas:
    obisKennzahl:
      type: string
      description: >-
        Die OBIS-Kennzahl für das Zählwerk, die festlegt, welche auf die
        gemessene Größe mit dem Stand gemeldet wird.

        Nur Zählwerkstände mit dieser OBIS-Kennzahl werden an diesem Zählwerk
        registriert. Beispiel:1-0:1.8.1 für

        elektrische Wirkarbeit.
